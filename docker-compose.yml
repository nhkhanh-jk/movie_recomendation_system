services:

  # OLTP — MySQL
  mysql:
    image: mysql:8.0
    container_name: movielens_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: movielens_oltp
      MYSQL_USER: mluser
      MYSQL_PASSWORD: mlpassword
    ports:
      - "3306:3306"           
    volumes:
      - mysql_data:/var/lib/mysql                        
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql  
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s    
      timeout: 5s    
      retries: 5       

  # OLAP — PostgreSQL 
  postgres:
    image: postgres:15
    container_name: movielens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
      POSTGRES_DB: movielens_olap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mluser -d movielens_olap"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  mysql_data:
  postgres_data:


networks:
  ml_network:
    driver: bridge
