services:

  # OLTP — MySQL
  mysql:
    image: mysql:8.0
    container_name: movielens_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: movielens_oltp
      MYSQL_USER: mluser
      MYSQL_PASSWORD: mlpassword
    ports:
      - "3306:3306"           
    volumes:
      - mysql_data:/var/lib/mysql                        
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql  
    networks:
      - ml_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s    
      timeout: 5s    
      retries: 5       

  # OLAP — PostgreSQL 
  postgres:
    image: postgres:15
    container_name: movielens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
      POSTGRES_DB: movielens_olap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mluser -d movielens_olap"]
      interval: 10s
      timeout: 5s
      retries: 5

# Database for airflow
  airflow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # Init : create user admin
  airflow-init:
    build: .
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: >-
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    depends_on:
      airflow-db:
        condition: service_healthy
    networks:
      - ml_network

  # Web ui p 8080
  airflow-webserver:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      POSTGRES_HOST: postgres
      MYSQL_HOST: mysql
    volumes:
      - ./dags:/opt/airflow/dags
      - ./main.py:/opt/airflow/main.py
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - airflow_logs:/opt/airflow/logs
    command: webserver
    depends_on:
      airflow-db:
        condition: service_healthy
    networks:
      - ml_network

  # Scheduler: chạy DAGs theo lịch
  airflow-scheduler:
    build: .
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      POSTGRES_HOST: postgres
      MYSQL_HOST: mysql
    volumes:
      - ./dags:/opt/airflow/dags
      - ./main.py:/opt/airflow/main.py
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
    networks:
      - ml_network

    # Giao diện API kết nối với PostgreSQL để lấy dữ liệu phim và gọi Models gợi ý
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: recommendation_api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./api:/app/api
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ml_network

volumes:
  mysql_data:
  postgres_data:
  airflow_db_data:
  airflow_logs:


networks:
  ml_network:
    driver: bridge
